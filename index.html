<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纯念蒸馏 - 九层佛塔系统</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<canvas id="aurora"></canvas>
<div id="scene-container"></div>
<div id="loading">正在构建佛塔...</div>

<div class="layer-nav">
  <button class="layer-btn" data-layer="0">1</button>
  <button class="layer-btn" data-layer="1">2</button>
  <button class="layer-btn" data-layer="2">3</button>
  <button class="layer-btn" data-layer="3">4</button>
  <button class="layer-btn" data-layer="4">5</button>
  <button class="layer-btn" data-layer="5">6</button>
  <button class="layer-btn" data-layer="6">7</button>
  <button class="layer-btn" data-layer="7">8</button>
  <button class="layer-btn" data-layer="8">9</button>
</div>

<div class="taskbar-bottom">
  <div class="logo">✨ 纯念蒸馏</div>
  <div class="time" id="clock">00:00:00</div>
  <div class="taskbar-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">未连接</span>
    <button class="chat-btn" id="chatBtn">💬</button>
    <button class="settings-btn" id="settingsBtn">⚙️</button>
  </div>
</div>

<div class="modal-overlay" id="chatModal">
  <div class="modal" id="chatModalBody">
    <div class="modal-header">
      <h2>💬 对话</h2>
      <button class="close-btn" onclick="closeChat()">×</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-message assistant">
        <div class="msg-content">欢迎使用纯念蒸馏，请选择一个层后开始对话。</div>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea id="chatInput" rows="2" placeholder="输入你的问题..."></textarea>
      <button class="btn primary" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ API 设置</h2>
      <button class="close-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>当前 Provider</label>
        <div class="provider-radios">
          <label><input type="radio" name="provider" value="minimax" checked> MiniMax</label>
          <label><input type="radio" name="provider" value="deepseek"> DeepSeek</label>
          <label><input type="radio" name="provider" value="openai"> OpenAI</label>
        </div>
      </div>
      <div class="provider-list">
        <div class="provider-item">
          <h4>🤖 MiniMax</h4>
          <select id="minimaxModel" class="model-select" style="margin-bottom:8px">
            <option value="">加载中...</option>
          </select>
          <input type="text" id="minimaxKey" placeholder="输入 API Key...">
        </div>
        <div class="provider-item">
          <h4>🔍 DeepSeek</h4>
          <select id="deepseekModel" class="model-select" style="margin-bottom:8px">
            <option value="">加载中...</option>
          </select>
          <input type="text" id="deepseekKey" placeholder="输入 API Key...">
        </div>
        <div class="provider-item">
          <h4>🧠 OpenAI 兼容</h4>
          <select id="openaiModel" class="model-select" style="margin-bottom:8px">
            <option value="">加载中...</option>
          </select>
          <input type="text" id="openaiUrl" placeholder="自定义 API URL（可选）" style="margin-bottom:8px">
          <input type="text" id="openaiKey" placeholder="输入 API Key...">
        </div>
      </div>
      <div class="form-group" style="margin-top:24px;padding-top:16px;border-top:1px solid rgba(100,100,200,0.2)">
        <label>📋 GitHub Gist 同步</label>
        <input type="text" id="gistToken" placeholder="GitHub Personal Access Token">
        <input type="text" id="gistId" placeholder="Gist ID（可选，留空自动创建）" style="margin-top:8px">
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn primary" onclick="exportToGist()" style="flex:1">📤 同步到Gist</button>
          <button class="btn" onclick="importFromGist()" style="flex:1">📥 从Gist导入</button>
        </div>
        <div id="gistStatus" style="margin-top:8px;font-size:12px;color:rgba(200,200,255,0.7)"></div>
      </div>
      <button class="btn primary" onclick="saveSettings()" style="margin-top:16px;width:100%">保存设置</button>
    </div>
  </div>
</div>

<script src="js/modules/three.min.js"></script>
<script src="js/modules/aurora.js"></script>
<script src="js/modules/pagoda.js"></script>
<script src="js/app.js"></script>
<script src="js/main.js"></script>
</body>
</html>
